name: Test casimir-tools

on:
  push:
    branches: [master]
    paths:
      - "casimir_tools/**"
      - ".github/workflows/test_casimir_tools.yml"
  pull_request:
    paths:
      - "casimir_tools/**"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install casimir-tools with dev deps
        working-directory: casimir_tools
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: casimir_tools
        run: pytest tests/ -v --tb=short
