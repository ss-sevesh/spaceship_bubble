<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spaceship Bubble Project Map</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #viz {
            flex-grow: 1;
            width: 100%;
            height: 100%;
        }
        .node {
            cursor: pointer;
            stroke-width: 2px;
        }
        .link {
            stroke: #30363d;
            stroke-opacity: 0.6;
            stroke-width: 2px;
            fill: none;
        }
        .label {
            font-size: 13px;
            fill: #adbac7;
            pointer-events: none;
            text-shadow: 0 1px 2px #000;
        }
        .header {
            padding: 20px;
            background: rgba(13, 17, 23, 0.8);
            border-bottom: 1px solid #30363d;
            z-index: 10;
        }
        .header h1 {
            margin: 0;
            font-size: 20px;
            color: #58a6ff;
        }
        .header p {
            margin: 5px 0 0;
            font-size: 14px;
            color: #8b949e;
        }
        .tooltip {
            position: absolute;
            background: #22272e;
            border: 1px solid #444c56;
            padding: 12px;
            border-radius: 6px;
            pointer-events: none;
            opacity: 0;
            font-size: 14px;
            max-width: 280px;
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        #status-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #8b949e;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Spaceship Bubble Architecture</h1>
        <p>Interactive Data & Logic Flow Map (Drag nodes to explore)</p>
    </div>
    
    <div id="status-msg">Initializing visualization... (Check internet connection for D3.js)</div>
    <div class="tooltip" id="tooltip"></div>
    <svg id="viz"></svg>

    <script>
        // Data structure representing your project components
        const data = {
            nodes: [
                { id: "API", group: "External", name: "Materials Project API", desc: "External source for DFT crystal structures and dielectric tensors (Te mp-19, WTe₂ mp-1023926)." },
                { id: "Fetch", group: "Logic", name: "fetch_materials.py", desc: "Pulls dielectric data from Materials Project API and caches as data/tellurium.json, data/wte2.json, data/td_wte2_dft.json." },
                { id: "Data", group: "Storage", name: "data/*.json", desc: "Local JSON files: tellurium.json (ε=164.27), wte2.json (ε=6.16), td_wte2_dft.json (ε_⊥=18.60, ε_∥=8.80)." },
                { id: "Physics", group: "Core", name: "src/lifshitz.py", desc: "Core physics engine: Lifshitz zero-T, chiral correction (Zhao 2009 symmetric + Silveirinha 2010 asymmetric), finite-T Matsubara, 2-oscillator Sellmeier, anisotropic uniaxial, Airy transfer-matrix." },
                { id: "Tools", group: "External", name: "casimir-tools (PyPI v0.1.6)", desc: "Open-source package published to PyPI. Mirrors src/lifshitz.py for external use. pip install casimir-tools." },
                { id: "Optimizer", group: "Logic", name: "src/optimizer.py (NSGA-II)", desc: "3-objective NSGA-II (pymoo): minimize |E_Casimir|, device thickness, thermal fraction f_T. Population 50, generations 100, seed 42." },
                { id: "Visualize", group: "Logic", name: "src/visualize.py", desc: "Generates all 12 publication-quality plots (300 DPI): Pareto front, chiral force, anisotropy, finite-T, 2-osc model, Td-WTe₂, Au/SiO₂ benchmark, and baseline sweeps." },
                { id: "Outputs", group: "Storage", name: "outputs/pareto_results.json", desc: "NSGA-II result: 50 Pareto solutions with variables (N_layers, d_nm, kappa_eff, theta_deg, kappa0, eps_eff) and objectives (E_Casimir, thickness_nm, thermal_fraction, slab_correction)." },
                { id: "Plots", group: "Storage", name: "plots/ (12 PNGs)", desc: "Generated figures: casimir_tellurium, casimir_wte2, casimir_comparison, casimir_chiral, pareto_front, casimir_force, casimir_force_chiral, casimir_aniso, casimir_td_wte2, casimir_2osc_model, casimir_finite_T, casimir_benchmark_au_sio2." },
                { id: "Sync", group: "Logic", name: "sync_assets.py", desc: "Copies plots/ → dashboard/public/plots/ and outputs/pareto_results.json → dashboard/public/data/ so the React dev server serves them." },
                { id: "FastAPI", group: "UI", name: "dashboard/server.py (FastAPI :8000)", desc: "Backend bridge: GET /api/results returns pareto JSON; POST /api/run-simulation triggers optimizer+plots+sync; GET /api/status returns idle/busy state." },
                { id: "Dashboard", group: "UI", name: "React Dashboard (:5173)", desc: "Immersive research UI: 3D Three.js metamaterial visualizer, 12-plot gallery, 50-row Pareto table with thermal fraction color coding, Download Report button." },
                { id: "ThreeJS", group: "UI", name: "CasimirScene.jsx (Three.js)", desc: "3D scene: Te chiral hexagonal plate (P3₁21 helical chains), WTe₂ substrate (hex P-6m2 or Td Pmn2₁ dynamically labeled), N metamaterial layers with chirality-based opacity." },
                { id: "Tests", group: "Logic", name: "tests/ (34 physics tests)", desc: "Validates Lifshitz prefactor, dielectric models, chiral corrections, force formula, anisotropic limits, finite-T Matsubara, and material constants. casimir_tools/ has 82 additional tests." },
                { id: "Main", group: "Logic", name: "main.py", desc: "Pipeline orchestrator: --fetch | --lifshitz | --optimize | --plot | --all. OPTIMIZER_SUBSTRATE=td selects Td-WTe₂ variant." }
            ],
            links: [
                { source: "API", target: "Fetch" },
                { source: "Fetch", target: "Data" },
                { source: "Data", target: "Physics" },
                { source: "Physics", target: "Tools" },
                { source: "Data", target: "Optimizer" },
                { source: "Physics", target: "Optimizer" },
                { source: "Optimizer", target: "Outputs" },
                { source: "Physics", target: "Visualize" },
                { source: "Outputs", target: "Visualize" },
                { source: "Visualize", target: "Plots" },
                { source: "Plots", target: "Sync" },
                { source: "Outputs", target: "Sync" },
                { source: "Sync", target: "Dashboard" },
                { source: "FastAPI", target: "Outputs" },
                { source: "FastAPI", target: "Dashboard" },
                { source: "Dashboard", target: "ThreeJS" },
                { source: "Main", target: "Fetch" },
                { source: "Main", target: "Physics" },
                { source: "Main", target: "Optimizer" },
                { source: "Main", target: "Visualize" },
                { source: "Main", target: "Sync" },
                { source: "Physics", target: "Tests" },
                { source: "Tools", target: "Tests" }
            ]
        };

        function init() {
            const status = document.getElementById('status-msg');
            if (typeof d3 === 'undefined') {
                status.innerHTML = "Error: D3.js failed to load. Please check your internet connection.";
                return;
            }
            status.style.display = 'none';

            const svg = d3.select("#viz");
            const width = window.innerWidth;
            const height = window.innerHeight - 80;

            svg.attr("viewBox", [0, 0, width, height]);

            // Arrow head definition
            svg.append("defs").append("marker")
                .attr("id", "arrowhead")
                .attr("viewBox", "-0 -5 10 10")
                .attr("refX", 20)
                .attr("refY", 0)
                .attr("orient", "auto")
                .attr("markerWidth", 5)
                .attr("markerHeight", 5)
                .attr("xoverflow", "visible")
                .append("svg:path")
                .attr("d", "M 0,-5 L 10 ,0 L 0,5")
                .attr("fill", "#30363d")
                .style("stroke", "none");

            const simulation = d3.forceSimulation(data.nodes)
                .force("link", d3.forceLink(data.links).id(d => d.id).distance(120))
                .force("charge", d3.forceManyBody().strength(-1000))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("x", d3.forceX(width / 2).strength(0.1))
                .force("y", d3.forceY(height / 2).strength(0.1));

            const link = svg.append("g")
                .selectAll("line")
                .data(data.links)
                .enter().append("line")
                .attr("class", "link")
                .attr("marker-end", "url(#arrowhead)");

            const node = svg.append("g")
                .selectAll("circle")
                .data(data.nodes)
                .enter().append("circle")
                .attr("class", "node")
                .attr("r", 10)
                .attr("fill", d => {
                    const colors = { External: "#f78166", Logic: "#58a6ff", Storage: "#3fb950", Core: "#d29922", UI: "#bc8cff" };
                    return colors[d.group] || "#8b949e";
                })
                .call(d3.drag()
                    .on("start", dragstarted)
                    .on("drag", dragged)
                    .on("end", dragended));

            const label = svg.append("g")
                .selectAll("text")
                .data(data.nodes)
                .enter().append("text")
                .attr("class", "label")
                .text(d => d.name)
                .attr("dx", 15)
                .attr("dy", 5);

            const tooltip = d3.select("#tooltip");

            node.on("mouseover", (event, d) => {
                tooltip.style("opacity", 1)
                    .html(`<strong style="color:${d3.select(event.currentTarget).attr("fill")}">${d.name}</strong><br/><span style="color:#8b949e;font-size:11px">${d.group.toUpperCase()}</span><br/><br/>${d.desc}`)
                    .style("left", (event.pageX + 10) + "px")
                    .style("top", (event.pageY - 10) + "px");
                d3.select(event.currentTarget).transition().duration(200).attr("r", 14);
            })
            .on("mouseout", (event, d) => {
                tooltip.style("opacity", 0);
                d3.select(event.currentTarget).transition().duration(200).attr("r", 10);
            });

            simulation.on("tick", () => {
                link
                    .attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);

                node
                    .attr("cx", d => d.x)
                    .attr("cy", d => d.y);

                label
                    .attr("x", d => d.x)
                    .attr("y", d => d.y);
            });

            function dragstarted(event) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }

            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }

            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0);
                event.subject.fx = null;
                event.subject.fy = null;
            }
        }

        // Run after page loads
        window.onload = init;
    </script>
</body>
</html>
